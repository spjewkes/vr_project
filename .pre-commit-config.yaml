minimum_pre_commit_version: "3.0.0"

repos:
  - repo: local
    hooks:
      - id: fix-text-whitespace
        name: Fix trailing whitespace and final newlines
        entry: python3 scripts/precommit/fix_text_whitespace.py
        language: system
        types: [text]

      - id: check-merge-conflicts
        name: Check for merge conflict markers
        entry: python3 scripts/precommit/check_merge_conflicts.py
        language: system
        types: [text]

      - id: clang-format
        name: Format C++ with clang-format
        entry: clang-format -i
        language: system
        files: ^src/.*\.(c|cc|cpp|cxx|h|hh|hpp|hxx)$

      - id: cmake-format
        name: Format CMake files
        entry: cmake-format -i
        language: system
        files: (^CMakeLists\.txt$|\.cmake$)

      - id: shell-syntax
        name: Check shell script syntax
        entry: sh -n
        language: system
        files: \.sh$
